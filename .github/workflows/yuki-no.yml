name: yuki-no

on:
  schedule:
    - cron: "0 * * * *" # Every hour
  workflow_dispatch: # Manual trigger

jobs:
  yuki-no:
    runs-on: ubuntu-latest
    steps:
      - uses: Gumball12/yuki-no@v1
        with:
          # GitHub token for authentication
          access-token: ${{ secrets.GITHUB_TOKEN }}

          # Upstream repository configuration
          head-repo: https://github.com/vitejs/vite

          # Tip of vitejs/vite main at setup (2026-03-29). Yuki-no tracks commits after this hash.
          # Refresh occasionally: git ls-remote https://github.com/vitejs/vite.git refs/heads/main
          track-from: 99897d27b44dd73307fa03e2f11f0baa1a1dc939

          # Files to track (Glob patterns)
          include: |
            docs/**

          # Enable release tracking
          # When enabled, Yuki-no will track releases for each issue
          # and add comments about release status.
          release-tracking: true
